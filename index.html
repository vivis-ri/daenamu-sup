<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대나무숲</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── 다크 모드 (기본) ── */
    :root {
      --bg:          #061206;
      --inp-bg:      rgba(0, 18, 0, 0.80);
      --inp-border:  rgba(55, 150, 55, 0.38);
      --inp-focus:   rgba(55, 150, 55, 0.65);
      --inp-color:   #b8e8b8;
      --inp-caret:   #4aff4a;
      --inp-ph:      rgba(120, 190, 120, 0.55);
      --hint:        rgba(100, 160, 100, 0.45);
      --fly-color:   #d4f7d4;
      --fly-shadow:  rgba(100, 255, 100, 0.5);
      --ff-bg:       #b8ff90;
      --ff-shadow:   rgba(130, 255, 80, 0.35);
      --btn-color:   rgba(110, 180, 110, 0.70);
    }

    /* ── 라이트 모드 ── */
    body.light {
      --bg:          #ddecd4;
      --inp-bg:      rgba(240, 250, 234, 0.88);
      --inp-border:  rgba(45, 115, 25, 0.45);
      --inp-focus:   rgba(45, 115, 25, 0.70);
      --inp-color:   #1a4a0a;
      --inp-caret:   #167a08;
      --inp-ph:      rgba(45, 110, 25, 0.60);
      --hint:        rgba(45, 110, 25, 0.55);
      --fly-color:   #1a4a0a;
      --fly-shadow:  rgba(30, 100, 15, 0.45);
      --ff-bg:       #5a9a28;
      --ff-shadow:   rgba(70, 150, 30, 0.40);
      --btn-color:   rgba(40, 110, 20, 0.75);
    }

    body {
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'Courier New', Courier, monospace;
      transition: background 0.4s;
    }

    #forest-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #mist {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(6, 18, 6, 0.96) 0%,
        rgba(6, 18, 6, 0.0)  25%,
        rgba(6, 18, 6, 0.0)  62%,
        rgba(6, 18, 6, 0.55) 100%
      );
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    body.light #mist {
      background: linear-gradient(
        to top,
        rgba(210, 235, 200, 0.96) 0%,
        rgba(210, 235, 200, 0.0)  25%,
        rgba(210, 235, 200, 0.0)  62%,
        rgba(210, 235, 200, 0.55) 100%
      );
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    #input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 24px 40px 36px;
      background: linear-gradient(to top, rgba(4, 12, 4, 0.97) 0%, rgba(4, 12, 4, 0) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: background 0.4s;
    }

    body.light #input-bar {
      background: linear-gradient(to top, rgba(195, 220, 182, 0.97) 0%, rgba(195, 220, 182, 0) 100%);
    }

    #message-input {
      width: min(580px, 90vw);
      background: var(--inp-bg);
      border: 1px solid var(--inp-border);
      border-radius: 1px;
      padding: 13px 22px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      color: var(--inp-color);
      outline: none;
      caret-color: var(--inp-caret);
      letter-spacing: 0.04em;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.4s, color 0.4s;
    }

    #message-input::placeholder { color: var(--inp-ph); }

    #message-input:focus {
      border-color: var(--inp-focus);
      box-shadow: 0 0 16px rgba(35, 110, 35, 0.18);
    }

    #message-input.flash {
      border-color: rgba(74, 255, 74, 0.85);
      box-shadow: 0 0 22px rgba(74, 255, 74, 0.28);
      transition: none;
    }

    .input-hint {
      font-size: 10px;
      color: var(--hint);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── 테마 토글 버튼 ── */
    #theme-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      width: 30px;
      height: 30px;
      background: var(--inp-bg);
      border: 1px solid var(--inp-border);
      color: var(--btn-color);
      font-size: 14px;
      cursor: pointer;
      border-radius: 1px;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.4s;
    }

    #theme-btn:hover { border-color: var(--inp-focus); }

    /* ── 사운드 토글 버튼 ── */
    #sound-btn {
      position: fixed;
      top: 18px;
      right: 56px;
      z-index: 20;
      width: 30px;
      height: 30px;
      background: var(--inp-bg);
      border: 1px solid var(--inp-border);
      color: var(--btn-color);
      font-size: 14px;
      cursor: pointer;
      border-radius: 1px;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.4s;
    }
    #sound-btn:hover { border-color: var(--inp-focus); }

    @keyframes fly-up {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      12%  { opacity: 1; }
      60%  { opacity: 0.75;
             transform: translate(calc(var(--tx)*0.58), calc(var(--ty)*0.52))
                        rotate(calc(var(--rot)*0.65)) scale(0.88); }
      85%  { opacity: 0.2;
             transform: translate(calc(var(--tx)*0.87), calc(var(--ty)*0.87))
                        rotate(var(--rot)) scale(0.55); }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.18);
             opacity: 0; }
    }

    .flying-char {
      position: fixed;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      color: var(--fly-color);
      pointer-events: none;
      animation: fly-up var(--dur) cubic-bezier(0.22, 0.44, 0.42, 0.92) forwards;
      text-shadow: 0 0 9px var(--fly-shadow);
      z-index: 4;
      will-change: transform, opacity;
    }

    @keyframes firefly-glow {
      0%, 100% { opacity: 0; transform: translate(0, 0); }
      20%       { opacity: 0; }
      50%       { opacity: 0.65; transform: translate(var(--fx), var(--fy)); }
      80%       { opacity: 0; }
    }

    .firefly {
      position: fixed;
      width: 3px;
      height: 3px;
      background: var(--ff-bg);
      border-radius: 50%;
      box-shadow: 0 0 7px 2px var(--ff-shadow);
      pointer-events: none;
      z-index: 3;
      animation: firefly-glow var(--ff-dur) ease-in-out forwards;
    }
  </style>
</head>
<body>
  <canvas id="forest-canvas"></canvas>
  <div id="mist"></div>
  <div id="particles"></div>
  <button id="sound-btn" title="배경음 켜기/끄기">♩</button>
  <button id="theme-btn" title="라이트/다크 모드">○</button>
  <div id="input-bar">
    <input
      type="text"
      id="message-input"
      placeholder="하고 싶은 말을 여기에..."
      autocomplete="off"
      spellcheck="false"
    >
    <span class="input-hint">Enter ↵ 를 누르면 사라집니다</span>
  </div>

  <script>
    const canvas = document.getElementById('forest-canvas');
    const ctx    = canvas.getContext('2d');
    const particles = document.getElementById('particles');
    const input     = document.getElementById('message-input');

    let stalks    = [];
    let startTime = null;
    let lastTime  = 0;
    const MAX_STALKS = 130;

    function rand(a, b)    { return a + Math.random() * (b - a); }
    function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

    function makeStalk(x, depth, initRows) {
      const maxRows = randInt(18, 36);
      const rows    = initRows ?? maxRows;
      return {
        x, depth,
        charSize:     8 + depth * 18,
        opacity:      0.20 + depth * 0.80,
        rows, maxRows,
        segH:         randInt(3, 6),
        swayPhase:    rand(0, Math.PI * 2),
        swaySpeed:    rand(0.22, 0.62),
        swayAmp:      rand(2.0, 5.0),
        growRate:     rows < maxRows ? rand(1.0, 2.5) : 0,
        spawnedChild: false,
        spawnChildAt: null,
      };
    }

    function spawnStalk(x, depth) {
      if (stalks.length >= MAX_STALKS) return;
      stalks.push(makeStalk(x, depth, 0));
      stalks.sort((a, b) => a.depth - b.depth);
    }

    // ── 숲 생성 ────────────────────────────────────────────────────

    function generateForest() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      stalks = [];
      const spacing = window.innerWidth < 600 ? 38 : 52;
      const count   = Math.floor(window.innerWidth / spacing) + 6;
      for (let i = 0; i < count; i++) {
        stalks.push(makeStalk(
          (i / count) * window.innerWidth + rand(-18, 18),
          Math.random()
        ));
      }
      stalks.sort((a, b) => a.depth - b.depth);
    }

    // ── 전체 렌더링 루프 ────────────────────────────────────────────

    function drawForest(elapsed) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t  = elapsed / 1000;
      const dt = Math.min(t - lastTime, 0.1);
      lastTime = t;

      for (const stalk of stalks) {
        if (stalk.rows < stalk.maxRows) {
          stalk.rows = Math.min(stalk.maxRows, stalk.rows + stalk.growRate * dt);
          if (!stalk.spawnedChild && stalk.rows >= stalk.maxRows * 0.7) {
            stalk.spawnedChild = true;
            stalk.spawnChildAt = t + rand(4, 10);
          }
        }
        if (stalk.spawnChildAt !== null && t >= stalk.spawnChildAt) {
          stalk.spawnChildAt = null;
          const cx = Math.max(10, Math.min(canvas.width - 10, stalk.x + rand(-70, 70)));
          spawnStalk(cx, Math.random());
        }

        const visRows = Math.floor(stalk.rows);
        if (visRows < 1) continue;

        const { x, depth, charSize: cs, segH, opacity, swayPhase, swaySpeed, swayAmp } = stalk;
        const sway  = Math.sin(t * swaySpeed + swayPhase) * swayAmp;
        const lh    = cs * 1.18;
        const baseY = canvas.height - 55;
        const lgt   = isDark ? (14 + depth * 16) : (38 - depth * 16);
        const nd    = isDark ? 4 : -4;

        ctx.save();
        ctx.globalAlpha  = opacity;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font         = `${cs}px monospace`;

        for (let row = 0; row < visRows; row++) {
          const bx = x + sway * (row / visRows);
          const y  = baseY - row * lh;
          if (y < -lh) break;
          const isNode = row > 0 && row % segH === 0;
          const isTop  = row === visRows - 1;
          if (isTop) {
            ctx.fillStyle = `hsl(115,52%,${lgt + nd + 2}%)`;
            ctx.fillText('╲╱', bx, y);
          } else if (isNode) {
            ctx.fillStyle = `hsl(118,48%,${lgt + nd}%)`;
            ctx.fillText('━', bx, y);
          } else {
            ctx.fillStyle = `hsl(115,50%,${lgt}%)`;
            ctx.fillText('█', bx, y);
          }
        }
        ctx.restore();
      }
    }

    function loop(timestamp) {
      if (!startTime) startTime = timestamp;
      drawForest(timestamp - startTime);
      requestAnimationFrame(loop);
    }

    // ── 글자 날리기 ─────────────────────────────────────────────────

    function launchCharacters(text, rect) {
      const chars  = [...text];
      const cx     = rect.left + rect.width  / 2;
      const cy     = rect.top  + rect.height / 2;
      const spread = Math.min(rect.width * 0.75, chars.length * 15);

      chars.forEach((ch, i) => {
        const span = document.createElement('span');
        span.className   = 'flying-char';
        span.textContent = ch;

        const sx = cx - spread / 2
          + (chars.length > 1 ? (i / (chars.length - 1)) * spread : 0)
          + rand(-7, 7);

        span.style.left = sx + 'px';
        span.style.top  = (cy + rand(-5, 5)) + 'px';

        const tx  = rand(-160, 160);
        const ty  = -(cy * rand(0.52, 0.84));
        const rot = rand(-24, 24);
        const dur = (1.35 + rand(0, 1.05) + i * 0.058).toFixed(2) + 's';

        span.style.setProperty('--tx',  tx  + 'px');
        span.style.setProperty('--ty',  ty  + 'px');
        span.style.setProperty('--rot', rot + 'deg');
        span.style.setProperty('--dur', dur);

        particles.appendChild(span);
        setTimeout(() => span.remove(), parseFloat(dur) * 1000 + 120);
      });
    }

    // ── 반딧불이 ────────────────────────────────────────────────────

    function spawnFirefly() {
      const ff = document.createElement('div');
      ff.className  = 'firefly';
      ff.style.left = rand(10, window.innerWidth  - 10) + 'px';
      ff.style.top  = rand(20, window.innerHeight * 0.72) + 'px';
      const dur = rand(2.8, 5.0).toFixed(1) + 's';
      ff.style.setProperty('--ff-dur', dur);
      ff.style.setProperty('--fx', rand(-28, 28) + 'px');
      ff.style.setProperty('--fy', rand(-18, 18) + 'px');
      particles.appendChild(ff);
      setTimeout(() => ff.remove(),    parseFloat(dur) * 1000 + 120);
      setTimeout(spawnFirefly, randInt(7000, 14000));
    }

    // ── 입력 처리 ───────────────────────────────────────────────────

    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' || e.isComposing) return;
      const text = input.value.trim();
      if (!text) return;
      launchCharacters(text, input.getBoundingClientRect());
      spawnStalk(rand(canvas.width * 0.05, canvas.width * 0.95), Math.random());
      input.value = '';
      input.classList.add('flash');
      setTimeout(() => input.classList.remove('flash'), 130);
      e.preventDefault();
    });

    // ── 리사이즈 ────────────────────────────────────────────────────

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(generateForest, 150);
    });

    // ── 테마 토글 ────────────────────────────────────────────────────

    const themeBtn = document.getElementById('theme-btn');
    let isDark = true;

    themeBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('light', !isDark);
      themeBtn.textContent = isDark ? '○' : '●';
    });

    // ── 배경음 (Web Audio API — 대나무숲 바람) ─────────────────────

    const soundBtn = document.getElementById('sound-btn');
    let audioCtx   = null;
    let masterGain = null;
    let isSoundOn  = false;

    function buildWindGraph() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // ① 화이트 노이즈 버퍼 (3초, 루프)
      const sr  = audioCtx.sampleRate;
      const buf = audioCtx.createBuffer(1, sr * 3, sr);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      noise.loop   = true;

      // ② 바람 레이어: 저역통과 + 고역통과로 부드러운 소음
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 0.6;

      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 90;

      // ③ LFO — 바람 세기 맥동 (매우 느림)
      const lfo     = audioCtx.createOscillator();
      lfo.type      = 'sine';
      lfo.frequency.value = 0.07;

      const lfoAmp  = audioCtx.createGain();
      lfoAmp.gain.value = 180;          // 주파수를 ±180Hz 흔들기
      lfo.connect(lfoAmp);
      lfoAmp.connect(lp.frequency);

      // ④ 스윕 LFO — 파도처럼 밀려오는 바람 볼륨
      const swellLfo  = audioCtx.createOscillator();
      swellLfo.type   = 'sine';
      swellLfo.frequency.value = 0.04;

      const swellBias = audioCtx.createGain();   // DC 오프셋 1.0
      swellBias.gain.value = 1.0;

      const swellDepth = audioCtx.createGain();
      swellDepth.gain.value = 0.42;

      const windLayer = audioCtx.createGain();
      windLayer.gain.value = 1.0;

      swellLfo.connect(swellDepth);
      swellDepth.connect(windLayer.gain);

      // ⑤ 사각거림 레이어: 중역대 노이즈 (잎/대나무 스침)
      const rustleGain = audioCtx.createGain();
      rustleGain.gain.value = 0.28;

      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 2.0;

      // ⑥ 대나무 클락 (낮은 노치 버스트) — 주기적 발생
      function scheduleClack(when) {
        if (!audioCtx || !isSoundOn) return;
        const b2 = audioCtx.createBuffer(1, Math.floor(sr * 0.05), sr);
        const d2 = b2.getChannelData(0);
        for (let i = 0; i < d2.length; i++) d2[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.006));
        const clk = audioCtx.createBufferSource();
        clk.buffer = b2;
        const clkBp = audioCtx.createBiquadFilter();
        clkBp.type = 'bandpass'; clkBp.frequency.value = 900 + Math.random() * 600; clkBp.Q.value = 8;
        const clkGain = audioCtx.createGain();
        clkGain.gain.value = 0.18 + Math.random() * 0.12;
        clk.connect(clkBp); clkBp.connect(clkGain); clkGain.connect(masterGain);
        clk.start(when);
        const next = when + 2.5 + Math.random() * 5.5;
        setTimeout(() => scheduleClack(audioCtx.currentTime + 2.5 + Math.random() * 5.5),
          Math.max(0, (next - audioCtx.currentTime - 1) * 1000));
      }

      // ⑦ 마스터 게인 (음소거용)
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;

      // 연결
      noise.connect(lp); lp.connect(hp); hp.connect(windLayer);
      windLayer.connect(masterGain);

      noise.connect(bp); bp.connect(rustleGain);
      rustleGain.connect(masterGain);

      masterGain.connect(audioCtx.destination);

      noise.start();
      lfo.start();
      swellLfo.start();

      setTimeout(() => scheduleClack(audioCtx.currentTime + 1), 100);
    }

    soundBtn.addEventListener('click', () => {
      buildWindGraph();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      isSoundOn = !isSoundOn;
      const target = isSoundOn ? 0.22 : 0;
      masterGain.gain.setTargetAtTime(target, audioCtx.currentTime, 1.2);
      soundBtn.textContent = isSoundOn ? '♪' : '♩';
    });

    // ── 초기화 ──────────────────────────────────────────────────────

    generateForest();
    requestAnimationFrame(loop);
    setTimeout(spawnFirefly, randInt(3000, 7000));
    input.focus();
  </script>
</body>
</html>
